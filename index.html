<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda De Carros</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">

        <div class="form-container">
            <div class="form-header">
                <p> Formulário</p>
                <h3>Cadastre seu veículo para vender mais rápido</h3>

            </div>
        </div>
        <div class="form-body">
            <h1 class="titulo-form">Venda Fácil Seu Carro</h1>
            <p>Descreva as características do seu veículo e marque as opcionais que ele possui.</p>
            <header class="cabecalho">
                <form>
                    <div class="caixainputs">
                        <label for="title">Título do anuncio<span class="campo-obrigatorio">*</span>
                        </label>
                        <input type="text" name="title" id="title" class="block"
                            placeholder="Digite um título para o anúncio">
                    </div>
                    <div class="caixainputs">
                        <label for="preco">Preço<span class="campo-obrigatorio">*</span>
                        </label>
                        <input type="text" name="title" id="preco" class="block" placeholder="Preço">
                    </div>
                    <div class="container">
                        <div class="caixainputs">
                            <label for="descricao" class="descricao">Descrição <span
                                    class="campo-obrigatorio">*</span></label>
                            <textarea name="descricao" id="descricao"
                                placeholder="Digite a descrição do veículo"></textarea>
                        </div>
                        <div class="caixainputs">
                            <label for="marca">Marca<span class="campo-obrigatorio">*</span>
                            </label>
                            <input type="text" name="title" id="marca" class="block" placeholder="Marca">
                        </div>
                        <div class="caixainputs">
                            <label for="modelo">Modelo<span class="campo-obrigatorio">*</span>
                            </label>
                            <input type="text" name="title" id="modelo" class="block" placeholder="Modelo">
                        </div>
                        <div class="caixainputs">
                            <label for="kilometragem">Kilometragem<span class="campo-obrigatorio">*</span>
                            </label>
                            <input type="title" name="title" id="kilometragem" class="block" placeholder="Kilometragem">
                        </div>
                        <div class="caixainputs">
                            <label for="data">Data<span class="campo-obrigatorio">*</span>
                            </label>
                            <input type="text" name="title" id="data-compra" class="block">


                        </div>
                        <div class="caixainputs">
                            <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                            <input type="radio" name="marcha"
                            id="manual">
                            <label for="manual">Manual</label>
                             <input type="radio" name="marcha"
                            id="automatico">
                            <label for="automatico">Automático</label>
                        </div>
                </form>
            </header>
        </div>
    </div>
</body>
</html>
